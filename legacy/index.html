<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Check List GTE de Guardia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #0071e3;
      --blue-dark: #0064cc;
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --border:    #d2d2d7;
      --text:      #1d1d1f;
      --secondary: #6e6e73;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PROGRESS ── */
    #progress-bar-container {
      position: fixed; top: 0; left: 0; right: 0; height: 3px;
      background: var(--border); z-index: 100;
    }
    #progress-bar {
      height: 100%; width: 0%; background: var(--blue);
      transition: width .3s ease;
    }
    #progress-label {
      position: fixed; top: 10px; right: 16px; z-index: 101;
      font-size: 12px; font-weight: 600; color: var(--secondary);
      background: var(--surface); padding: 4px 10px;
      border-radius: 20px; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    /* ── HEADER ── */
    .hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 56px 24px 28px;
      text-align: center;
    }
    .logo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--text); color: #fff;
      font-size: 17px; font-weight: 700; letter-spacing: .5px;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-size: clamp(20px, 4vw, 26px); font-weight: 700;
      letter-spacing: -.4px; color: var(--text);
    }
    .hero p { margin-top: 6px; font-size: 15px; color: var(--secondary); }

    /* ── SALA SELECTOR ── */
    .sala-selector {
      display: flex; gap: 12px; margin: 24px auto 0;
      max-width: 340px; justify-content: center;
    }
    .sala-btn {
      flex: 1; padding: 12px 18px;
      border: 2px solid var(--border); border-radius: 12px;
      background: var(--surface); color: var(--secondary);
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .sala-btn:hover { border-color: var(--blue); color: var(--blue); }
    .sala-btn.active {
      border-color: var(--blue); background: var(--blue);
      color: #fff; box-shadow: 0 4px 14px rgba(0,113,227,.3);
    }

    /* ── LAYOUT ── */
    .container { max-width: 760px; margin: 0 auto; padding: 28px 16px 64px; }

    /* ── CARD ── */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      margin-bottom: 20px; overflow: hidden;
    }
    .card-header {
      padding: 18px 22px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header .section-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .card-header h2 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.1px; }
    .card-header .section-counter {
      font-size: 12px; font-weight: 600;
      color: var(--secondary); white-space: nowrap;
    }
    /* ── SELECT ALL ── */
    .select-all-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: var(--blue);
      background: none; border: none; cursor: pointer; padding: 4px 8px;
      border-radius: 6px; font-family: inherit; white-space: nowrap;
      transition: background .15s;
    }
    .select-all-btn:hover { background: rgba(0,113,227,.08); }
    .select-all-btn.all-done { color: var(--secondary); }

    /* ── INFO GRID ── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 520px) { .info-grid { grid-template-columns: 1fr; } }
    .field-group {
      padding: 16px 22px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .field-group:nth-child(2n) { border-right: none; }
    .field-group:nth-last-child(-n+2) { border-bottom: none; }
    .field-group.full-width { grid-column: 1 / -1; border-right: none; }
    @media (max-width: 520px) {
      .field-group { border-right: none; }
      .field-group:last-child { border-bottom: none; }
    }
    .field-group label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--secondary); margin-bottom: 6px;
    }
    .field-group input, .field-group select {
      width: 100%; border: none; outline: none;
      font-size: 15px; font-family: inherit;
      color: var(--text); background: transparent; padding: 0;
      appearance: none; -webkit-appearance: none;
    }
    .field-group input::placeholder { color: #b0b0ba; }

    /* ── GERENTE INPUT (prominente) ── */
    .gerente-wrap {
      display: flex; align-items: center; gap: 10px;
      border: 2px solid var(--border); border-radius: 10px;
      padding: 10px 14px; background: var(--bg);
      transition: border-color .2s, background .2s;
    }
    .gerente-wrap:focus-within {
      border-color: var(--blue); background: #fff;
    }
    .gerente-wrap svg { flex-shrink: 0; color: var(--secondary); }
    .gerente-wrap input {
      flex: 1; border: none !important; outline: none;
      font-size: 16px; font-weight: 500; font-family: inherit;
      color: var(--text); background: transparent; padding: 0;
    }
    .gerente-wrap input::placeholder { color: #b0b0ba; }

    /* sala badge shown in info card */
    .sala-badge {
      display: inline-block; padding: 3px 12px; border-radius: 20px;
      font-size: 14px; font-weight: 600;
      background: var(--blue); color: #fff;
    }

    /* ── CHECKLIST ── */
    .checklist-list { list-style: none; }
    .checklist-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 22px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .15s; user-select: none;
    }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item:hover { background: #f9f9fb; }
    .checklist-item.checked { background: #f0f9ff; }
    .checkbox-visual {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; background: var(--surface);
    }
    .checklist-item.checked .checkbox-visual { background: var(--blue); border-color: var(--blue); }
    .checkbox-visual svg { opacity: 0; transform: scale(.5); transition: all .2s; }
    .checklist-item.checked .checkbox-visual svg { opacity: 1; transform: scale(1); }
    .item-text { font-size: 14.5px; line-height: 1.5; color: var(--text); flex: 1; }
    .checklist-item.checked .item-text {
      color: var(--secondary);
      text-decoration: line-through;
      text-decoration-color: var(--border);
    }
    input[type="checkbox"] { display: none; }

    /* ── OBSERVACIONES ── */
    .obs-body { padding: 18px 22px; }
    .obs-body textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14.5px; font-family: inherit;
      color: var(--text); background: var(--bg); resize: vertical;
      min-height: 110px; outline: none; transition: border-color .2s; line-height: 1.6;
    }
    .obs-body textarea:focus { border-color: var(--blue); background: #fff; }
    .obs-body textarea::placeholder { color: var(--secondary); }

    /* ── SUBMIT ── */
    .submit-section { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px 0 4px; }
    #summary-text { font-size: 13px; color: var(--secondary); text-align: center; }
    .submit-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; max-width: 340px; padding: 16px 28px;
      background: var(--blue); color: #fff; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: background .2s, transform .1s, opacity .2s;
      box-shadow: 0 4px 16px rgba(0,113,227,.35);
    }
    .submit-btn:hover { background: var(--blue-dark); }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border-radius: 20px;
      padding: 32px 28px; max-width: 340px; width: 100%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-icon { font-size: 44px; margin-bottom: 12px; }
    .modal h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .modal p  { font-size: 14px; color: var(--secondary); line-height: 1.5; margin-bottom: 24px; }
    .modal-btn {
      display: block; width: 100%; padding: 14px;
      background: var(--blue); color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GATE SCREEN ── */
    #gate { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
    #gate h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #gate p  { font-size: 15px; color: var(--secondary); margin-bottom: 28px; }
    .gate-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .gate-sala-btn {
      padding: 18px 36px; border-radius: 16px;
      border: 2px solid var(--border); background: var(--surface);
      font-size: 18px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .2s; color: var(--text);
      box-shadow: var(--shadow); min-width: 160px;
    }
    .gate-sala-btn:hover {
      border-color: var(--blue); color: var(--blue);
      box-shadow: 0 4px 20px rgba(0,113,227,.2);
    }

    .app-hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- PANTALLA DE SELECCIÓN DE SALA -->
  <div id="gate">
    <div class="logo-badge" style="margin-bottom:20px;">BZ</div>
    <h2>Check List GTE de Guardia</h2>
    <p>Seleccioná la sala para completar el informe</p>
    <div class="gate-btns">
      <button class="gate-sala-btn" onclick="elegirSala('PASTEKO')">PASTEKO</button>
      <button class="gate-sala-btn" onclick="elegirSala('STEPAKO')">STEPAKO</button>
    </div>
  </div>

  <!-- APP PRINCIPAL (oculta hasta elegir sala) -->
  <div id="app" class="app-hidden">

    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <div id="progress-label">0 / 45</div>

    <header class="hero">
      <div class="logo-badge">BZ</div>
      <h1>Check List GTE de Guardia</h1>
      <p id="hero-subtitle">Completá todos los ítems del turno antes de enviar</p>
    </header>

    <main class="container">
      <form id="checklist-form" novalidate>

        <!-- INFO DEL TURNO -->
        <div class="card">
          <div class="card-header">
            <div class="section-icon" style="background:#f0f0f5;">📋</div>
            <h2>Información del Turno</h2>
          </div>
          <div class="info-grid">
            <div class="field-group">
              <label>Sala</label>
              <span id="sala-display" class="sala-badge">—</span>
            </div>
            <div class="field-group">
              <label for="fecha">Fecha</label>
              <input type="date" id="fecha" name="fecha" required>
            </div>
            <div class="field-group full-width" style="border-bottom:none;">
              <label for="gerente">Gerente de guardia</label>
              <div class="gerente-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" id="gerente" name="gerente" placeholder="Ingresá tu nombre completo" required autocomplete="off">
              </div>
            </div>
          </div>
        </div>

        <!-- SECCIONES -->
        <div id="sections-container"></div>

        <!-- OBSERVACIONES -->
        <div class="card">
          <div class="card-header">
            <div class="section-icon" style="background:#fff8ec;">💬</div>
            <h2>Observaciones Importantes</h2>
          </div>
          <div class="obs-body">
            <textarea id="observaciones" name="observaciones"
              placeholder="Anotá cualquier novedad, incidente o comentario relevante del turno..."></textarea>
          </div>
        </div>

        <!-- SUBMIT -->
        <div class="submit-section">
          <p id="summary-text">Completá los campos obligatorios para enviar</p>
          <button type="submit" id="submit-btn" class="submit-btn">
            <span class="btn-text">Enviar Check List</span>
            <span class="btn-arrow">→</span>
          </button>
        </div>

      </form>
    </main>

  </div><!-- /#app -->

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div id="modal-icon" class="modal-icon"></div>
      <h3 id="modal-title"></h3>
      <p  id="modal-message"></p>
      <button id="modal-close" class="modal-btn">Aceptar</button>
    </div>
  </div>

  <script>
    // ── DATOS ──────────────────────────────────────────────
    var SECTIONS = [
      {
        id: "apertura", label: "1. APERTURA / INICIO DE TURNO",
        icon: "🏁", color: "#e8f5e9",
        items: [
          { key: "ap1", text: "Verificar dotación completa de personal" },
          { key: "ap2", text: "Confirmar puestos críticos cubiertos (caja, slots, seguridad, técnica, gastronomía)" },
          { key: "ap3", text: "Revisar ausencias, llegadas tarde." },
          { key: "ap4", text: "Confirmar apertura operativa de todos los sectores." },
          { key: "ap5", text: "Verificar presentación general de sala." },
          { key: "ap6", text: "Controlar limpieza general, baños y áreas comunes." },
          { key: "ap7", text: "Revisar climatización, iluminación, música ambiente y aroma" },
          { key: "ap8", text: "Confirmar funcionamiento de accesos y puertas de emergencia" }
        ]
      },
      {
        id: "seguridad", label: "2. SEGURIDAD Y CONTROL",
        icon: "🔒", color: "#fff3e0",
        items: [
          { key: "seg1", text: "Confirmar presencia de personal de seguridad" },
          { key: "seg2", text: "Verificar funcionamiento de CCTV" },
          { key: "seg3", text: "Revisar cobertura de cámaras en sectores sensibles" },
          { key: "seg4", text: "Confirmar estado de matafuegos y salidas de emergencia visibles" },
          { key: "seg5", text: "Confirmar que no haya situaciones sospechosas en sala" },
          { key: "seg6", text: "Revisar libro de novedades de seguridad" }
        ]
      },
      {
        id: "slots", label: "3. SLOTS / JUEGO",
        icon: "🎰", color: "#fce4ec",
        items: [
          { key: "sl1", text: "Verificar porcentaje de máquinas operativas" },
          { key: "sl2", text: "Revisar máquinas fuera de servicio y tiempo estimado de reparación" },
          { key: "sl3", text: "Controlar orden y limpieza en parque de máquinas" },
          { key: "sl4", text: "Verificar correcto funcionamiento de sistemas de tickets / cashless" },
          { key: "sl5", text: "Revisar ocupación de sala y sectores calientes/fríos" },
          { key: "sl6", text: "Confirmar que jackpots / progresivos / cartelería funcionen bien" },
          { key: "sl7", text: "Verificar personal de sala visible y atento al cliente" },
          { key: "sl8", text: "Revisar incidencias técnicas del turno" },
          { key: "sl9", text: "Confirmar stock de insumos cajas de tito" }
        ]
      },
      {
        id: "experiencia", label: "4. EXPERIENCIA DEL CLIENTE",
        icon: "⭐", color: "#ede7f6",
        items: [
          { key: "exp1",  text: "Recorrer sala y saludar clientes frecuentes / VIP" },
          { key: "exp2",  text: "Controlar tiempos de atención al cliente" },
          { key: "exp3",  text: "Verificar calidad de atención del personal" },
          { key: "exp4",  text: "Revisar limpieza y orden en sectores de alto tránsito" },
          { key: "exp5",  text: "Confirmar servicio correcto en gastronomía / bar / café" },
          { key: "exp6",  text: "Verificar promociones, sorteos o activaciones del día" },
          { key: "exp7",  text: "Revisar cartelería, pantallas y comunicación vigente" },
          { key: "exp8",  text: "Confirmar resolución de quejas o reclamos abiertos" },
          { key: "exp9",  text: "Detectar oportunidades comerciales en sala" },
          { key: "exp10", text: "Monitorear el frente del complejo, iluminación y limpieza" }
        ]
      },
      {
        id: "personal", label: "5. PERSONAL Y LIDERAZGO",
        icon: "👥", color: "#e3f2fd",
        items: [
          { key: "per1", text: "Observar desempeño de jefes" },
          { key: "per2", text: "Detectar necesidad de apoyo o redistribución de personal" },
          { key: "per3", text: "Corregir desvíos operativos en el momento" },
          { key: "per4", text: "Reconocer buenas prácticas del equipo y vestimenta" },
          { key: "per5", text: "Registrar faltas, incumplimientos o puntos de mejora" }
        ]
      },
      {
        id: "comercial", label: "6. SEGUIMIENTO COMERCIAL",
        icon: "📊", color: "#e8f5e9",
        items: [
          { key: "com1", text: "Revisar nivel de ocupación de sala" },
          { key: "com2", text: "Identificar franjas horarias de mayor tráfico" },
          { key: "com3", text: "Verificar rendimiento de promociones activas" },
          { key: "com4", text: "Controlar presencia de clientes frecuentes / VIP / nuevos" },
          { key: "com5", text: "Detectar oportunidades de fidelización" },
          { key: "com6", text: "Registrar comentarios del cliente útiles para futuras acciones" },
          { key: "com7", text: "Monitorear competencia / eventos externos si impactan en la sala" }
        ]
      }
    ];

    var TOTAL    = 45;
    var checks   = {};
    var salaActual = null;

    // ── SELECTOR DE SALA ──────────────────────────────────
    function elegirSala(sala) {
      salaActual = sala;
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").classList.remove("app-hidden");
      document.getElementById("sala-display").textContent = sala;
      document.getElementById("hero-subtitle").textContent = "Sala " + sala + " — completá todos los ítems antes de enviar";
      renderSections();
      document.getElementById("fecha").value = new Date().toISOString().split("T")[0];
      updateProgress();
    }

    // ── RENDER ────────────────────────────────────────────
    function renderSections() {
      var container = document.getElementById("sections-container");
      container.innerHTML = "";
      SECTIONS.forEach(function(sec) {
        var card = document.createElement("div");
        card.className = "card";

        var header = document.createElement("div");
        header.className = "card-header";
        header.innerHTML =
          '<div class="section-icon" style="background:' + sec.color + ';">' + sec.icon + '</div>' +
          '<h2>' + sec.label + '</h2>' +
          '<span class="section-counter" id="counter-' + sec.id + '">0 / ' + sec.items.length + '</span>' +
          '<button type="button" class="select-all-btn" id="selall-' + sec.id + '" data-section="' + sec.id + '">Seleccionar todo</button>';

        header.querySelector(".select-all-btn").addEventListener("click", function(e) {
          e.stopPropagation();
          toggleSelectAll(this.dataset.section);
        });

        var list = document.createElement("ul");
        list.className = "checklist-list";

        sec.items.forEach(function(item) {
          checks[item.key] = false;
          var li = document.createElement("li");
          li.className = "checklist-item";
          li.dataset.key = item.key;
          li.dataset.section = sec.id;
          li.innerHTML =
            '<div class="checkbox-visual">' +
              '<svg width="12" height="9" viewBox="0 0 12 9" fill="none">' +
                '<path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '</svg>' +
            '</div>' +
            '<span class="item-text">' + item.text + '</span>' +
            '<input type="checkbox" name="' + item.key + '">';
          li.addEventListener("click", function() { toggleItem(this); });
          list.appendChild(li);
        });

        card.appendChild(header);
        card.appendChild(list);
        container.appendChild(card);
      });
    }

    // ── TOGGLE ────────────────────────────────────────────
    function toggleItem(li) {
      var key   = li.dataset.key;
      var secId = li.dataset.section;
      checks[key] = !checks[key];
      li.classList.toggle("checked", checks[key]);
      li.querySelector("input[type=checkbox]").checked = checks[key];
      updateCounters(secId);
      updateProgress();
    }

    function updateCounters(secId) {
      var sec  = SECTIONS.find(function(s){ return s.id === secId; });
      var done = sec.items.filter(function(i){ return checks[i.key]; }).length;
      document.getElementById("counter-" + secId).textContent = done + " / " + sec.items.length;
      var btn = document.getElementById("selall-" + secId);
      if (btn) {
        var allDone = done === sec.items.length;
        btn.textContent = allDone ? "Deseleccionar todo" : "Seleccionar todo";
        btn.classList.toggle("all-done", allDone);
      }
    }

    function toggleSelectAll(secId) {
      var sec     = SECTIONS.find(function(s){ return s.id === secId; });
      var allDone = sec.items.every(function(i){ return checks[i.key]; });
      var newVal  = !allDone;
      sec.items.forEach(function(item) {
        checks[item.key] = newVal;
        var li = document.querySelector('[data-key="' + item.key + '"]');
        if (li) {
          li.classList.toggle("checked", newVal);
          li.querySelector("input[type=checkbox]").checked = newVal;
        }
      });
      updateCounters(secId);
      updateProgress();
    }

    function updateProgress() {
      var done = Object.values(checks).filter(Boolean).length;
      var pct  = Math.round(done / TOTAL * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-label").textContent = done + " / " + TOTAL;
      document.getElementById("summary-text").textContent = done === TOTAL
        ? "Todo completo — listo para enviar ✓"
        : done + " de " + TOTAL + " ítems completados";
    }

    // ── SUBMIT ────────────────────────────────────────────
    document.getElementById("checklist-form").addEventListener("submit", function(e) {
      e.preventDefault();
      var fecha   = document.getElementById("fecha").value.trim();
      var gerente = document.getElementById("gerente").value.trim();
      if (!fecha || !gerente) {
        showModal("⚠️", "Campos obligatorios", "Completá la Fecha y el nombre del Gerente antes de enviar.");
        return;
      }
      var datos = {
        sala:          salaActual,
        fecha:         fecha,
        gerente:       gerente,
        checks:        checks,
        observaciones: document.getElementById("observaciones").value.trim()
      };
      setLoading(true);

      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onError)
        .guardarChecklist(datos);
    });

    function onSuccess(result) {
      setLoading(false);
      if (result && result.ok) {
        var now = new Date();
        var hora = now.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
        var fecha = now.toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit", year: "numeric" });
        showModal("✅", "¡Check list enviado!", "Sala " + salaActual + " · Fila " + result.fila + "\nEnviado el " + fecha + " a las " + hora + "h", true);
      } else {
        showModal("❌", "Error al guardar", "Error del servidor: " + (result ? result.error : "respuesta vacía"));
      }
    }

    function onError(err) {
      setLoading(false);
      var detalle = err && err.message ? err.message : (err ? String(err) : "sin detalle");
      showModal("❌", "Error al enviar", "Detalle: " + detalle + "\n\nVerificá que el SHEET_ID esté configurado y que el script tenga permisos.");
    }

    function setLoading(loading) {
      var btn = document.getElementById("submit-btn");
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<div class="spinner"></div>'
        : '<span class="btn-text">Enviar Check List</span><span class="btn-arrow">→</span>';
    }

    // ── MODAL ─────────────────────────────────────────────
    function showModal(icon, title, msg, reset) {
      document.getElementById("modal-icon").textContent    = icon;
      document.getElementById("modal-title").textContent   = title;
      document.getElementById("modal-message").textContent = msg;
      document.getElementById("modal-overlay").classList.remove("hidden");
      document.getElementById("modal-close").onclick = function() {
        document.getElementById("modal-overlay").classList.add("hidden");
        if (reset) resetForm();
      };
    }

    function resetForm() {
      document.getElementById("checklist-form").reset();
      Object.keys(checks).forEach(function(k){ checks[k] = false; });
      document.querySelectorAll(".checklist-item").forEach(function(li){
        li.classList.remove("checked");
        li.querySelector("input[type=checkbox]").checked = false;
      });
      SECTIONS.forEach(function(sec){
        document.getElementById("counter-" + sec.id).textContent = "0 / " + sec.items.length;
        var btn = document.getElementById("selall-" + sec.id);
        if (btn) { btn.textContent = "Seleccionar todo"; btn.classList.remove("all-done"); }
      });
      updateProgress();
      document.getElementById("fecha").value = new Date().toISOString().split("T")[0];
      // Volver a la pantalla de selección de sala
      document.getElementById("app").classList.add("app-hidden");
      document.getElementById("gate").style.display = "";
      salaActual = null;
    }
  </script>
</body>
</html>
